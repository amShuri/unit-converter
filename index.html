<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Unit Converter</title>
</head>
<body>
    <header>
        <h1>Metric/Imperial Unit Conversion</h1>
        <form id="convert-form">
            <input type="number" id="unit-input" placeholder="20" min="1" required>
            <button>Convert</button>
        </form>
    </header>
    <main>
        <section>
            <h2>Length (Meter/Feet)</h2>
            <p id="length-el">20 meters = 65.620 feet | 20 feet = 6.096 meters</p>
        </section>
        
        <section>
            <h2>Volume (Liters/Gallons)</h2>
            <p id="volume-el">20 liters = 5.280 gallons | 20 gallons = 75.758 liters</p>
        </section>
        
        <section>
            <h2>Mass (Kilograms/Pounds)</h2>
            <p id="mass-el">20 kilos = 44.080 pounds | 20 pounds= 9.074 kilos</p>
        </section>
    </main>
    <script src="index.js"></script>
</body>
</html>
